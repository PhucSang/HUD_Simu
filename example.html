<div class="HUD_Simu-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>HUD Simu</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div>
                <input id="hud_simu_enabled_checkbox" type="checkbox" />
                <label for="hud_simu_enabled_checkbox">Enable HUD Simu</label>
            </div>
            <div>
                <input id="hud_simu_test_button" class="menu_button" type="submit" value="Test Button" />
            </div>
            <p><small>Toggle this and refresh - it should remember your choice.</small></p>
        </div>
    </div>
</div>
